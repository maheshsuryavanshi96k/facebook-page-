<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in or sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Left Side: Brand Logo and Text -->
        <div class="left-box">
            <h1 class="logo">facebook</h1>
            <p class="tagline">Facebook helps you connect and share with the people in your life.</p>
        </div>

        <!-- Right Side: Login Form Box -->
        <div class="right-box">
            <div class="form-container">
                <form action="#">
                    <div class="input-field">
                        <input type="text" placeholder="Email address or phone number" required>
                    </div>
                    <div class="input-field">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-btn">Log In</button>
                    <a href="#" class="forgot-password">Forgotten password?</a>
                    <hr class="divider">
                    <button type="button" class="create-account-btn">Create new account</button>
                </form>
            </div>
            <p class="create-page-text"><a href="#"><b>Create a Page</b></a> for a celebrity, brand or business.</p>
        </div>
    </div>
</body>
</html>
